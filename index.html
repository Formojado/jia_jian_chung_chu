<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master | 算術大師</title>
    <style>
        :root {
            --bg: #1e293b; /* 深灰藍，不那麼黑，更清晰 */
            --card-bg: #f8fafc;
            --primary: #3b82f6;
            --accent: #10b981;
            --warn: #ef4444;
            --text-dark: #1e293b;
            --text-light: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text-light);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 90vw;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }

        /* 題目顯示區 */
        #question-box {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            margin: 40px 0;
            font-weight: 800;
            color: #fff;
        }

        /* 輸入框 */
        .input-group { display: flex; justify-content: center; align-items: center; gap: 15px; }
        input[type=number] {
            background: #f1f5f9;
            border: 3px solid transparent;
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 3rem;
            width: 180px;
            padding: 10px;
            text-align: center;
            outline: none;
            -moz-appearance: textfield;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* 按鈕 */
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover, .btn.selected { transform: translateY(-3px); filter: brightness(1.2); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-warn { background: var(--warn); }

        .status-bar { display: flex; justify-content: space-around; font-size: 1.2rem; margin-bottom: 20px; color: #94a3b8; }
        .skipped-count { color: var(--warn); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-menu" class="screen active">
        <h1 style="font-size: 3rem;">Math Master</h1>
        <div class="btn-grid">
            <button class="btn nav-item" onclick="setMode('add')">加法 (+)</button>
            <button class="btn nav-item" onclick="setMode('sub')">減法 (−)</button>
            <button class="btn nav-item" onclick="setMode('mul')">乘法 (×)</button>
            <button class="btn nav-item" onclick="setMode('div')">除法 (÷)</button>
            <button class="btn btn-outline nav-item" onclick="setMode('mix')">混合運算</button>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <h2 id="setup-title">練習設定</h2>
        <div style="margin-bottom: 30px;">
            <p>位數：<span id="digit-val">1</span></p>
            <input type="range" min="1" max="4" value="1" style="width: 80%" oninput="updateSetupText('digit', this.value)">
            <p>運算項數：<span id="count-val">2</span></p>
            <input type="range" min="2" max="4" value="2" style="width: 80%" oninput="updateSetupText('count', this.value)">
        </div>
        <div class="btn-grid">
            <button class="btn nav-item" onclick="initGame('sprint')">碼表速跑 (10題)</button>
            <button class="btn nav-item" onclick="initGame('timed')">限時挑戰 (60s)</button>
            <button class="btn btn-warn nav-item" onclick="showScreen('screen-menu')">取消</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="status-bar">
            <span>模式: <span id="game-info">--</span></span>
            <span>進度: <span id="progress">0/10</span></span>
            <span>待補做: <span class="skipped-count" id="skipped-num">0</span></span>
            <span>時間: <span id="timer">00:00</span></span>
        </div>
        <div id="question-box">--</div>
        <div class="input-group">
            <input type="number" id="ans-q" class="nav-item" placeholder="答">
            <div id="div-rem-box" style="display: none;">
                <span style="font-size: 2rem;">餘</span>
                <input type="number" id="ans-r" class="nav-item" placeholder="餘">
            </div>
        </div>
        <div class="btn-grid" style="margin-top: 40px;">
            <button class="btn nav-item" onclick="checkAnswer()">確認 (Enter)</button>
            <button class="btn btn-outline nav-item" onclick="skipQuestion()">跳過 (ArrowDown)</button>
        </div>
    </div>
</div>

<script>
    let config = { type: '', digits: 1, count: 2, gameMode: '' };
    let game = {
        questions: [],
        skipped: [],
        currentIndex: 0,
        correctCount: 0,
        startTime: 0,
        timerId: null,
        isFinished: false
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setMode(type) {
        config.type = type;
        document.getElementById('setup-title').innerText = `${type.toUpperCase()} 模式設定`;
        showScreen('screen-setup');
    }

    function updateSetupText(key, val) {
        config[key] = parseInt(val);
        document.getElementById(`${key}-val`).innerText = val;
    }

    function initGame(mode) {
        config.gameMode = mode;
        game = { questions: [], skipped: [], currentIndex: 0, correctCount: 0, startTime: Date.now(), isFinished: false };
        
        // 預生成 10 題
        for(let i=0; i<10; i++) game.questions.push(generateQuestionData());
        
        document.getElementById('game-info').innerText = `${config.type} | ${mode}`;
        document.getElementById('div-rem-box').style.display = config.type === 'div' ? 'flex' : 'none';
        
        showScreen('screen-game');
        renderQuestion();
        startTimer();
    }

    function generateQuestionData() {
        let nums = [];
        for(let i=0; i<config.count; i++) {
            let max = Math.pow(10, config.digits) - 1;
            let min = Math.pow(10, config.digits - 1);
            nums.push(Math.floor(Math.random() * (max - min + 1)) + min);
        }

        let text = '', ans = 0, rem = 0;
        if(config.type === 'div') {
            // 除法鎖定被除數為設定位數
            let a = nums[0];
            let b = Math.floor(Math.random() * 89) + 2; // 除數固定 1-2 位
            text = `${a} ÷ ${b}`;
            ans = Math.floor(a / b);
            rem = a % b;
        } else {
            // 加減乘混合邏輯
            ans = nums[0];
            text = nums[0].toString();
            for(let i=1; i<nums.length; i++) {
                let op = config.type === 'mix' ? ['+','-','*'][Math.floor(Math.random()*3)] : (config.type === 'add' ? '+' : (config.type === 'sub' ? '-' : '*'));
                if(op === '+') { ans += nums[i]; text += ` + ${nums[i]}`; }
                else if(op === '-') { 
                    if(ans < nums[i]) { // 避免負數
                        text = `${nums[i]} - ${text}`;
                        ans = nums[i] - ans;
                    } else {
                        text += ` - ${nums[i]}`;
                        ans -= nums[i];
                    }
                }
                else { ans *= nums[i]; text = `(${text}) × ${nums[i]}`; }
            }
        }
        return { text, ans, rem };
    }

    function renderQuestion() {
        let q = game.questions[game.currentIndex];
        document.getElementById('question-box').innerText = q.text + " = ?";
        document.getElementById('ans-q').value = '';
        document.getElementById('ans-r').value = '';
        document.getElementById('progress').innerText = `${game.currentIndex + 1}/${game.questions.length}`;
        document.getElementById('skipped-num').innerText = game.skipped.length;
        document.getElementById('ans-q').focus();
    }

    function checkAnswer() {
        let q = game.questions[game.currentIndex];
        let userAns = parseInt(document.getElementById('ans-q').value);
        let userRem = parseInt(document.getElementById('ans-r').value) || 0;

        if(userAns === q.ans && (config.type !== 'div' || userRem === q.rem)) {
            nextStep();
        } else {
            alert("再想一下喔！");
        }
    }

    function skipQuestion() {
        // 把目前的題目丟進 skipped 陣列
        game.skipped.push(game.questions[game.currentIndex]);
        nextStep();
    }

    function nextStep() {
        game.currentIndex++;
        if(game.currentIndex >= game.questions.length) {
            if(game.skipped.length > 0) {
                // 如果有跳過的題目，把 skipped 轉成新的 questions 繼續做
                game.questions = [...game.skipped];
                game.skipped = [];
                game.currentIndex = 0;
                alert("現在開始補做刚才跳過的題目！");
                renderQuestion();
            } else {
                finishGame();
            }
        } else {
            renderQuestion();
        }
    }

    function finishGame() {
        game.isFinished = true;
        clearInterval(game.timerId);
        let timeUsed = document.getElementById('timer').innerText;
        alert(`恭喜完成！總耗時：${timeUsed}`);
        showScreen('screen-menu');
    }

    function startTimer() {
        clearInterval(game.timerId);
        game.timerId = setInterval(() => {
            let now = Date.now();
            let diff = Math.floor((now - game.startTime) / 1000);
            let m = Math.floor(diff / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    // 全鍵盤操作
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') checkAnswer();
        if(e.key === 'ArrowDown') skipQuestion();
        if(e.key === 'ArrowRight' && config.type === 'div') document.getElementById('ans-r').focus();
        if(e.key === 'ArrowLeft') document.getElementById('ans-q').focus();
    });
</script>

</body>
</html>
