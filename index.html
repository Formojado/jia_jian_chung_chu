<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Matrix Pro | 數位運算練習器</title>
    <style>
        :root {
            --bg: #050505;
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --text: #ffffff;
            --sub-text: #888;
        }

        /* 基礎樣式與大字體 */
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 95vw;
            max-width: 800px;
            text-align: center;
            border: 3px solid var(--neon-blue);
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            position: relative;
        }

        .screen { display: none; }
        .active { display: block; animation: zoomIn 0.3s ease-out; }

        /* 題目顯示區 */
        #question-display {
            font-size: clamp(3rem, 10vw, 6rem); /* 自適應大字體 */
            margin: 40px 0;
            text-shadow: 0 0 10px var(--neon-blue);
            font-weight: bold;
        }

        /* 輸入框樣式 - 移除上下箭頭 */
        input[type=number] {
            background: transparent;
            border: none;
            border-bottom: 4px solid var(--sub-text);
            color: var(--neon-green);
            font-size: 4rem;
            width: 180px;
            text-align: center;
            margin: 0 10px;
            transition: border-color 0.3s;
            -moz-appearance: textfield; /* Firefox */
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input:focus {
            outline: none;
            border-bottom-color: var(--neon-green);
        }

        .rem-label { font-size: 2rem; color: var(--sub-text); }

        /* 按鈕樣式 */
        .btn-group {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 30px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
        }

        /* 鍵盤選中狀態 (亮起來) */
        .btn:focus, .btn.selected {
            background: var(--neon-blue);
            color: var(--bg);
            box-shadow: 0 0 20px var(--neon-blue);
            outline: none;
        }

        .btn-red { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-red:focus, .btn-red.selected { background: var(--neon-red); color: var(--text); box-shadow: 0 0 20px var(--neon-red); }

        /* 響應式微調 */
        @media (max-width: 600px) {
            input[type=number] { width: 120px; font-size: 2.5rem; }
            .btn { padding: 10px 20px; font-size: 1.2rem; }
        }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div id="menu-screen" class="screen active">
        <h1 style="color:var(--neon-blue); font-size: 3rem;">MATH MATRIX</h1>
        <div class="btn-group">
            <button class="btn nav-item" onclick="showSetup('add')">加法 (+)</button>
            <button class="btn nav-item" onclick="showSetup('sub')">減法 (−)</button>
            <button class="btn nav-item" onclick="showSetup('mul')">乘法 (×)</button>
            <button class="btn nav-item" onclick="showSetup('div')">除法 (÷)</button>
            <button class="btn nav-item" onclick="showSetup('mix')">混合 (Mixed)</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <h2 id="setup-title">選擇挑戰等級</h2>
        <div class="btn-group" id="digit-btns">
            </div>
        <button class="btn btn-red nav-item" style="margin-top: 30px;" onclick="goHome()">返回選單</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="question-display">---</div>
        <div id="answer-zone">
            <input type="number" id="input-q" class="nav-item" placeholder="商">
            <span id="rem-wrap" style="display:none;">
                <span class="rem-label">餘</span>
                <input type="number" id="input-r" class="nav-item" placeholder="餘">
            </span>
        </div>
        <div class="btn-group">
            <button id="btn-confirm" class="btn nav-item" onclick="checkAnswer()">確認 (ENTER)</button>
            <button id="btn-skip" class="btn btn-red nav-item" onclick="generateQuestion()">跳過</button>
        </div>
    </div>
</div>

<script>
    let state = {
        mode: '',
        digits: 1,
        q: 0,
        r: 0,
        navIndex: 0
    };

    const screens = ['menu-screen', 'setup-screen', 'game-screen'];

    function switchScreen(id) {
        screens.forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById(id).classList.add('active');
        state.navIndex = 0;
        focusCurrent();
    }

    function showSetup(mode) {
        state.mode = mode;
        const btnArea = document.getElementById('digit-btns');
        btnArea.innerHTML = '';
        
        let options = mode === 'div' ? [1, 2] : [1, 2, 3, 4];
        options.forEach(d => {
            const label = mode === 'div' ? (d === 1 ? '除數一位' : '除數兩位') : `${d}位數`;
            btnArea.innerHTML += `<button class="btn nav-item" onclick="startGame(${d})">${label}</button>`;
        });
        
        switchScreen('setup-screen');
    }

    function startGame(digits) {
        state.digits = digits;
        switchScreen('game-screen');
        generateQuestion();
    }

    function generateQuestion() {
        const display = document.getElementById('question-display');
        const remWrap = document.getElementById('rem-wrap');
        const qInput = document.getElementById('input-q');
        const rInput = document.getElementById('input-r');

        qInput.value = '';
        rInput.value = '';
        remWrap.style.display = (state.mode === 'div') ? 'inline' : 'none';

        let a, b, text;
        const max = Math.pow(10, state.digits) - 1;
        const min = Math.pow(10, state.digits - 1);

        if (state.mode === 'div') {
            a = Math.floor(Math.random() * 900) + 100; // 被除數維持三位
            b = state.digits === 1 ? Math.floor(Math.random() * 9) + 1 : Math.floor(Math.random() * 90) + 10;
            state.q = Math.floor(a / b);
            state.r = a % b;
            text = `${a} ÷ ${b}`;
        } else if (state.mode === 'mix') {
            // 複雜混合體： (a + b) * c 或 a * b - c
            a = Math.floor(Math.random() * 50) + 10;
            b = Math.floor(Math.random() * 50) + 2;
            let c = Math.floor(Math.random() * 10) + 2;
            let type = Math.floor(Math.random() * 3);
            if(type === 0) { text = `(${a} + ${b}) × ${c}`; state.q = (a + b) * c; }
            else if(type === 1) { text = `${a} × ${c} - ${b}`; state.q = (a * c) - b; }
            else { text = `${a} + ${b} × ${c}`; state.q = a + (b * c); }
        } else {
            a = Math.floor(Math.random() * (max - min + 1)) + min;
            b = Math.floor(Math.random() * (max - min + 1)) + min;
            if (state.mode === 'add') { text = `${a} + ${b}`; state.q = a + b; }
            if (state.mode === 'sub') { if(a < b) [a, b] = [b, a]; text = `${a} - ${b}`; state.q = a - b; }
            if (state.mode === 'mul') { text = `${a} × ${b}`; state.q = a * b; }
        }

        display.innerText = text + " = ?";
        qInput.focus();
    }

    function checkAnswer() {
        const uQ = parseInt(document.getElementById('input-q').value);
        const uR = parseInt(document.getElementById('input-r').value) || 0;

        if (uQ === state.q && (state.mode !== 'div' || uR === state.r)) {
            alert("Correct!");
            generateQuestion();
        } else {
            alert("Wrong! Try again.");
        }
    }

    function goHome() { switchScreen('menu-screen'); }

    // --- 鍵盤導航邏輯 ---
    function focusCurrent() {
        const items = document.querySelector('.active').querySelectorAll('.nav-item');
        if (items[state.navIndex]) {
            items[state.navIndex].focus();
            // 視覺上給按鈕加上 class
            items.forEach(el => el.classList.remove('selected'));
            items[state.navIndex].classList.add('selected');
        }
    }

    document.addEventListener('keydown', (e) => {
        const activeScreen = document.querySelector('.active');
        const items = Array.from(activeScreen.querySelectorAll('.nav-item'));
        
        if (e.key === 'ArrowRight') {
            state.navIndex = (state.navIndex + 1) % items.length;
            focusCurrent();
        } else if (e.key === 'ArrowLeft') {
            state.navIndex = (state.navIndex - 1 + items.length) % items.length;
            focusCurrent();
        } else if (e.key === 'ArrowDown') {
            // 跳轉到按鈕區 (通常是最後兩個)
            state.navIndex = items.length - 2;
            focusCurrent();
        } else if (e.key === 'ArrowUp') {
            // 跳回輸入區
            state.navIndex = 0;
            focusCurrent();
        } else if (e.key === 'Enter') {
            // 如果焦點在按鈕上，觸應按鈕點擊，否則執行 checkAnswer
            if (!document.activeElement.classList.contains('btn')) {
                e.preventDefault();
                checkAnswer();
            }
        }
    });
</script>

</body>
</html>
