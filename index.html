<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Matrix | 數位算術練習場</title>
    <style>
        :root {
            --bg-color: #0a0b0e;
            --accent-color: #00f2ff;
            --error-color: #ff4d4d;
            --success-color: #39ff14;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            background: rgba(20, 22, 26, 0.9);
            border: 2px solid var(--accent-color);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s; }

        h1 { color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            border-radius: 5px;
        }

        .btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        #question-area { font-size: 2.5rem; margin: 30px 0; font-family: 'Courier New', monospace; }

        input {
            background: #1a1c23;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            font-size: 1.5rem;
            width: 80px;
            text-align: center;
            border-radius: 5px;
            margin: 5px;
        }

        input:focus { outline: none; border-color: var(--accent-color); }

        .stats { font-size: 0.9rem; color: #888; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu" class="screen active">
        <h1>Math Matrix</h1>
        <p>請選擇練習模組</p>
        <button class="btn" onclick="startSetup('add')">加法 (+)</button>
        <button class="btn" onclick="startSetup('sub')">減法 (−)</button>
        <button class="btn" onclick="startSetup('mul')">乘法 (×)</button>
        <button class="btn" onclick="startSetup('div')">除法 (÷)</button>
        <button class="btn" onclick="startSetup('mix')">核心混合 (Mixed)</button>
    </div>

    <div id="setup" class="screen">
        <h2 id="setup-title">設定難度</h2>
        <div id="digit-options">
            <button class="btn" onclick="startGame(1)">個位數</button>
            <button class="btn" onclick="startGame(2)">兩位數</button>
            <button class="btn" onclick="startGame(3)">三位數</button>
        </div>
        <button class="btn" style="margin-top:20px; border-color: #666; color: #666;" onclick="showScreen('menu')">返回</button>
    </div>

    <div id="game" class="screen">
        <div class="stats">
            模式: <span id="mode-display"></span> | 
            得分: <span id="score">0</span> | 
            時間: <span id="timer">--</span>
        </div>
        <div id="question-area">12 + 24 = ?</div>
        <div id="input-container">
            <input type="number" id="ans-main" placeholder="答">
            <span id="div-extra" style="display:none;">
                餘 <input type="number" id="ans-rem" placeholder="餘">
            </span>
        </div>
        <div style="margin-top: 20px;">
            <button class="btn" onclick="checkAnswer()">確認答案 (Enter)</button>
            <button class="btn" onclick="nextQuestion()">跳過</button>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let currentDigits = 1;
    let score = 0;
    let currentQuestion = {};
    let usedQuestions = new Set();

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startSetup(mode) {
        currentMode = mode;
        document.getElementById('setup-title').innerText = `${mode.toUpperCase()} 模式設定`;
        showScreen('setup');
    }

    function startGame(digits) {
        currentDigits = digits;
        score = 0;
        usedQuestions.clear();
        document.getElementById('score').innerText = score;
        document.getElementById('mode-display').innerText = currentMode;
        showScreen('game');
        nextQuestion();
    }

    function generateNumbers() {
        let max = Math.pow(10, currentDigits) - 1;
        let min = Math.pow(10, currentDigits - 1);
        return [
            Math.floor(Math.random() * (max - min + 1) + min),
            Math.floor(Math.random() * (max - min + 1) + min)
        ];
    }

    function nextQuestion() {
        let [a, b] = generateNumbers();
        let qText = '';
        let correctA = 0, correctR = 0;
        
        document.getElementById('div-extra').style.display = 'none';
        document.getElementById('ans-main').value = '';
        document.getElementById('ans-rem').value = '';

        switch(currentMode) {
            case 'add':
                qText = `${a} + ${b}`;
                correctA = a + b;
                break;
            case 'sub':
                if (a < b) [a, b] = [b, a]; // 防止負數
                qText = `${a} - ${b}`;
                correctA = a - b;
                break;
            case 'mul':
                qText = `${a} × ${b}`;
                correctA = a * b;
                break;
            case 'div':
                document.getElementById('div-extra').style.display = 'inline';
                qText = `${a} ÷ ${b}`;
                correctA = Math.floor(a / b);
                correctR = a % b;
                break;
            case 'mix':
                // 簡單混合運算： (a + b) * c
                let c = Math.floor(Math.random() * 9) + 2;
                qText = `(${a} + ${b}) × ${c}`;
                correctA = (a + b) * c;
                break;
        }

        if (usedQuestions.has(qText)) return nextQuestion();
        usedQuestions.add(qText);
        
        currentQuestion = { text: qText, a: correctA, r: correctR };
        document.getElementById('question-area').innerText = qText + " = ?";
        document.getElementById('ans-main').focus();
    }

    function checkAnswer() {
        let userA = parseInt(document.getElementById('ans-main').value);
        let userR = parseInt(document.getElementById('ans-rem').value) || 0;

        let isCorrect = (userA === currentQuestion.a);
        if (currentMode === 'div') {
            isCorrect = (userA === currentQuestion.a && userR === currentQuestion.r);
        }

        if (isCorrect) {
            score += 10;
            document.getElementById('score').innerText = score;
            nextQuestion();
        } else {
            alert("計算錯誤，再試一次或跳過！");
        }
    }

    // 支援 Enter 鍵
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>

</body>
</html>
