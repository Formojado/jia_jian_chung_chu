<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Matrix Elite</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #10b981;
            --secondary: #f97316;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 95vw;
            max-width: 1100px;
            background: var(--surface);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }

        /* 移除輸入框上下按鈕 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* 符號按鈕設計 */
        .symbol-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; }
        .op-btn {
            aspect-ratio: 1; font-size: 3.5rem; background: var(--primary);
            border: none; border-radius: 24px; color: white; cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .op-btn:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .op-btn.mixed { background: var(--secondary); font-size: 2.5rem; }

        /* 設定介面 */
        .setting-card { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-bottom: 15px; text-align: left; }
        .setting-card label { display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 10px; color: #94a3b8; }
        .setting-card span { color: var(--primary); font-weight: bold; }

        /* 題目區域 - 確保不換行且字體自適應 */
        #question-container {
            font-size: clamp(1.8rem, 6vw, 5rem);
            margin: 50px 0;
            font-weight: 800;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        /* 輸入區域 - 極簡化 */
        .input-wrap { display: flex; justify-content: center; align-items: center; gap: 15px; }
        input[type=number] {
            background: #f8fafc; border: 4px solid transparent; border-radius: 16px; 
            color: var(--bg); font-size: 3rem; width: 220px; padding: 15px; 
            text-align: center; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); }
        #ans-rem { width: 140px; background: #e2e8f0; } /* 餘數稍微暗一點點做區隔 */

        .btn-action {
            padding: 18px 36px; font-size: 1.3rem; font-weight: 700; border-radius: 16px;
            border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-confirm { background: var(--primary); color: white; width: 100%; }
        .btn-skip { background: transparent; border: 2px solid #ef4444; color: #ef4444; width: 100%; }

        .status-top { display: flex; justify-content: space-between; font-family: monospace; color: #94a3b8; margin-bottom: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-menu" class="screen active">
        <h1 style="margin-bottom: 40px; letter-spacing: 2px;">MATH MATRIX</h1>
        <div class="symbol-grid">
            <button class="op-btn" onclick="setOp('add')">+</button>
            <button class="op-btn" onclick="setOp('sub')">−</button>
            <button class="op-btn" onclick="setOp('mul')">×</button>
            <button class="op-btn" onclick="setOp('div')">÷</button>
            <button class="op-btn mixed" onclick="setOp('mix')">MIX</button>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <h2 id="setup-title">SETTINGS</h2>
        <div class="setting-card">
            <label>Digits: <span id="val-digits">1</span></label>
            <input type="range" min="1" max="8" value="1" oninput="upd('digits', this.value)">
        </div>
        <div class="setting-card" id="terms-card">
            <label>Terms: <span id="val-terms">2</span></label>
            <input type="range" min="2" max="8" value="2" oninput="upd('terms', this.value)">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px;">
            <button class="btn-action btn-confirm" onclick="init('sprint')">SPRINT</button>
            <button class="btn-action btn-confirm" onclick="init('timed')">TIMED</button>
            <button class="btn-action btn-confirm" style="background:#6366f1" onclick="init('unlimited')">♾️</button>
        </div>
        <button class="btn-action btn-skip" style="margin-top: 15px;" onclick="show('screen-menu')">BACK</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="status-top">
            <span id="info-mode">MODE</span>
            <span id="info-timer">00:00</span>
            <span id="info-progress">0/0</span>
        </div>
        <div id="question-container">---</div>
        <div class="input-wrap">
            <input type="number" id="ans-main" placeholder="?">
            <input type="number" id="ans-rem" style="display:none" placeholder="...">
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-top: 40px;">
            <button class="btn-action btn-confirm" onclick="check()">CONFIRM</button>
            <button class="btn-action btn-skip" onclick="skip()">SKIP</button>
        </div>
    </div>
</div>

<script>
    let conf = { op: '', digits: 1, terms: 2, mode: '' };
    let game = { pool: [], skipped: [], idx: 0, timer: null, start: 0 };

    const show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    const upd = (k, v) => { conf[k] = parseInt(v); document.getElementById(`val-${k}`).innerText = v; };

    function setOp(op) { 
        conf.op = op; 
        document.getElementById('terms-card').style.display = (op === 'div') ? 'none' : 'block';
        show('screen-setup'); 
    }

    function init(mode) {
        conf.mode = mode;
        game = { pool: [], skipped: [], idx: 0, start: Date.now() };
        let count = (mode === 'unlimited') ? 999 : 10;
        for(let i=0; i<count; i++) game.pool.push(genMath());
        
        document.getElementById('ans-rem').style.display = (conf.op === 'div') ? 'block' : 'none';
        show('screen-game');
        render();
        clock();
    }

    function genMath() {
        const getNum = (d) => {
            let max = Math.pow(10, d);
            let min = Math.pow(10, d-1);
            return Math.floor(Math.random() * (max - min)) + min;
        };

        if(conf.op === 'div') {
            let a = getNum(conf.digits);
            let b = Math.floor(Math.random() * 89) + 2; 
            return { text: `${a} ÷ ${b}`, ans: Math.floor(a/b), rem: a%b };
        }

        let termsCount = conf.terms;
        let nums = [];
        for(let i=0; i<termsCount; i++) {
            // 混合題隨機位數，其他模式固定位數
            let d = (conf.op === 'mix') ? (Math.floor(Math.random() * conf.digits) + 1) : conf.digits;
            nums.push(getNum(d));
        }

        let res = nums[0], txt = nums[0].toString();
        for(let i=1; i<nums.length; i++) {
            let op = conf.op === 'mix' ? ['+','-','*'][Math.floor(Math.random()*3)] : (conf.op==='add'?'+':(conf.op==='sub'?'-':'*'));
            if(op === '+') { res += nums[i]; txt += ` + ${nums[i]}`; }
            else if(op === '-') { 
                if(res < nums[i]) { txt = `${nums[i]} - (${txt})`; res = nums[i] - res; }
                else { txt += ` - ${nums[i]}`; res -= nums[i]; }
            } else {
                if(txt.includes('+') || txt.includes('-')) txt = `(${txt})`;
                res *= nums[i]; txt += ` × ${nums[i]}`;
            }
        }
        return { text: txt, ans: res, rem: 0 };
    }

    function render() {
        let q = game.pool[game.idx];
        document.getElementById('question-container').innerText = q.text;
        document.getElementById('ans-main').value = '';
        document.getElementById('ans-rem').value = '';
        document.getElementById('info-progress').innerText = (conf.mode === 'unlimited') ? '♾️' : `${game.idx + 1}/${game.pool.length}`;
        document.getElementById('ans-main').focus();
    }

    function check() {
        let q = game.pool[game.idx];
        let a = parseInt(document.getElementById('ans-main').value);
        let r = parseInt(document.getElementById('ans-rem').value) || 0;
        if(a === q.ans && (conf.op !== 'div' || r === q.rem)) next();
    }

    function skip() { game.skipped.push(game.pool[game.idx]); next(); }

    function next() {
        game.idx++;
        if(game.idx >= game.pool.length) {
            if(game.skipped.length > 0) { game.pool = [...game.skipped]; game.skipped = []; game.idx = 0; render(); }
            else { clearInterval(game.timer); show('screen-menu'); }
        } else render();
    }

    function clock() {
        clearInterval(game.timer);
        game.timer = setInterval(() => {
            let sec = Math.floor((Date.now() - game.start) / 1000);
            document.getElementById('info-timer').innerText = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
        }, 1000);
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') check();
        if(e.key === 'ArrowDown') skip();
        if(e.key === 'ArrowRight' && conf.op === 'div') document.getElementById('ans-rem').focus();
        if(e.key === 'ArrowLeft') document.getElementById('ans-main').focus();
    });
</script>
</body>
</html>
