<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Matrix Elite - Pure</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #10b981;
            --secondary: #f97316;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 98vw;
            max-width: 1200px;
            background: var(--surface);
            border-radius: 40px;
            padding: 50px 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; animation: slideIn 0.3s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes errorFlash {
            0% { border-color: var(--danger); background: rgba(239, 68, 68, 0.2); transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            100% { border-color: transparent; background: #f8fafc; transform: translateX(0); }
        }

        @keyframes successPop {
            0% { transform: scale(1); color: var(--text); }
            50% { transform: scale(1.05); color: var(--primary); }
            100% { transform: scale(1); color: var(--text); }
        }

        .ans-error { animation: errorFlash 0.2s ease-in-out !important; }
        .success-glow { animation: successPop 0.2s ease-out; }
        .q-fade { animation: fadeIn 0.1s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .symbol-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 20px; }
        .op-btn {
            aspect-ratio: 1.2; font-size: 5rem; background: var(--primary);
            border: none; border-radius: 30px; color: white; cursor: pointer;
            transition: 0.15s;
        }
        .op-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        .setting-card { background: rgba(0,0,0,0.25); padding: 25px; border-radius: 25px; margin-bottom: 20px; text-align: left; }
        .setting-card label { display: flex; justify-content: space-between; font-size: 1.8rem; margin-bottom: 20px; color: #94a3b8; }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 28px; 
            background: #334155; border-radius: 14px; outline: none; accent-color: var(--primary);
            cursor: pointer;
        }

        .custom-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .custom-input-grid input { 
            background: #0f172a; border: 2px solid #334155; color: var(--primary);
            padding: 15px; font-size: 1.5rem; border-radius: 15px; text-align: center; width: 100%;
        }

        #q-wrap { width: 100%; height: 160px; margin: 20px 0; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #q-text { font-weight: 900; white-space: nowrap; }

        .input-wrap { display: flex; justify-content: center; align-items: center; gap: 20px; }
        input#ans-main, input#ans-rem {
            background: #f8fafc; border: 4px solid transparent; border-radius: 20px; 
            color: var(--bg); font-size: 4rem; width: 350px; padding: 25px; 
            text-align: center; outline: none;
        }
        input#ans-rem { width: 180px; background: #cbd5e1; }

        .btn-action {
            padding: 25px; font-size: 1.8rem; font-weight: 800; border-radius: 20px;
            border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-confirm { background: var(--primary); color: white; width: 100%; }
        .btn-skip { background: transparent; border: 3px solid var(--danger); color: var(--danger); width: 100%; }

        .status-top { display: flex; justify-content: space-between; font-size: 1.5rem; color: #94a3b8; margin-bottom: 10px; font-family: monospace; font-weight: bold; }
        #info-mode { color: var(--secondary); text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-menu" class="screen active">
        <h1 style="font-size: 4rem; margin-bottom: 50px;">MATH MATRIX</h1>
        <div class="symbol-grid">
            <button class="op-btn" onclick="setOp('add')">+</button>
            <button class="op-btn" onclick="setOp('sub')">−</button>
            <button class="op-btn" onclick="setOp('mul')">×</button>
            <button class="op-btn" onclick="setOp('div')">÷</button>
            <button class="op-btn" style="background:var(--secondary); font-size:3rem;" onclick="setOp('mix')">MIX</button>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <h2 style="font-size: 3rem; margin-top: 0;">SETTINGS</h2>
        <div class="setting-card">
            <label>Digits: <span id="val-digits" style="color:var(--primary)">1</span></label>
            <input type="range" min="1" max="8" value="1" oninput="upd('digits', this.value)">
        </div>
        <div class="setting-card" id="terms-card">
            <label>Terms: <span id="val-terms" style="color:var(--primary)">2</span></label>
            <input type="range" min="2" max="8" value="2" oninput="upd('terms', this.value)">
        </div>
        
        <div class="custom-input-grid">
            <div>
                <label style="color:#94a3b8; display:block; margin-bottom:8px;">Sprint Qs</label>
                <input type="number" id="cfg-sprint" value="10">
            </div>
            <div>
                <label style="color:#94a3b8; display:block; margin-bottom:8px;">Timed Secs</label>
                <input type="number" id="cfg-timed" value="60">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 30px;">
            <button class="btn-action btn-confirm" onclick="init('sprint')">SPRINT</button>
            <button class="btn-action btn-confirm" onclick="init('timed')">TIMED</button>
            <button class="btn-action btn-confirm" style="background:#6366f1" onclick="init('unlimited')">♾️</button>
        </div>
        <button class="btn-action btn-skip" style="margin-top: 20px;" onclick="show('screen-menu')">BACK</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="status-top">
            <span id="info-mode">MODE</span>
            <span id="info-timer">00:00</span>
            <span id="info-progress">0/0</span>
        </div>
        <div id="q-wrap"><span id="q-text">---</span></div>
        <div class="input-wrap">
            <input type="number" id="ans-main" placeholder="?">
            <input type="number" id="ans-rem" style="display:none" placeholder="R">
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 40px;">
            <button class="btn-action btn-confirm" onclick="check()">CONFIRM</button>
            <button class="btn-action btn-skip" onclick="skip()">SKIP</button>
        </div>
    </div>
</div>

<script>
    let conf = { op: '', digits: 1, terms: 2, mode: '' };
    let game = { pool: [], idx: 0, timer: null, start: 0 };
    const opMap = { add: '+', sub: '−', mul: '×', div: '÷', mix: 'MIX' };

    const show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    const upd = (k, v) => { conf[k] = parseInt(v); document.getElementById(`val-${k}`).innerText = v; };

    function setOp(op) { 
        conf.op = op; 
        document.getElementById('terms-card').style.display = (op === 'div') ? 'none' : 'block';
        show('screen-setup'); 
    }

    function init(mode) {
        conf.mode = mode;
        game = { pool: [], idx: 0, start: Date.now() };
        let count = (mode === 'unlimited') ? 999 : parseInt(document.getElementById('cfg-sprint').value);
        for(let i=0; i<count; i++) game.pool.push(genMath());
        document.getElementById('info-mode').innerText = `${conf.mode} (${opMap[conf.op]})`;
        document.getElementById('ans-rem').style.display = (conf.op === 'div') ? 'block' : 'none';
        show('screen-game');
        render();
        clock();
    }

    function genMath() {
        const getNum = (maxD) => {
            let minD = Math.max(1, maxD - 2); 
            let d = Math.floor(Math.random() * (maxD - minD + 1)) + minD;
            let max = Math.pow(10, d), min = Math.pow(10, d-1);
            return Math.floor(Math.random() * (max - min)) + min;
        };

        if(conf.op === 'div') {
            let a = getNum(conf.digits);
            let b = Math.floor(Math.random() * 89) + 2; 
            return { text: `${a} ÷ ${b}`, ans: Math.floor(a/b), rem: a%b };
        }

        let nums = [];
        for(let i=0; i<conf.terms; i++) nums.push(getNum(conf.digits));
        
        let res = nums[0], txtArr = [nums[0]];

        for(let i=1; i<nums.length; i++) {
            let ops = ['+', '-', '×'];
            if (conf.op === 'mix') ops.push('÷');
            let curOp = conf.op === 'mix' ? ops[Math.floor(Math.random() * ops.length)] : (conf.op==='add'?'+':(conf.op==='sub'?'-':'×'));
            
            if(curOp === '+') { res += nums[i]; txtArr.push('+', nums[i]); }
            else if(curOp === '-') { 
                if(res < nums[i]) { 
                    // 不夠減時直接交換順序，不加括號
                    let oldRes = res;
                    res = nums[i] - oldRes;
                    txtArr = [nums[i], '-', ...txtArr]; 
                } else {
                    res -= nums[i];
                    txtArr.push('-', nums[i]);
                }
            } 
            else if(curOp === '×') {
                res *= nums[i];
                txtArr.push('×', nums[i]);
            }
            else if(curOp === '÷') {
                let divisor = Math.floor(Math.random() * 11) + 2; 
                let adjustment = res % divisor;
                res = res - adjustment;
                if (res <= 0) res = divisor * 2;
                txtArr = [res, '÷', divisor]; // 混合題除法保持簡單整除
                res = res / divisor;
            }
        }
        return { text: txtArr.join(' '), ans: res, rem: 0 };
    }

    function render() {
        const wrap = document.getElementById('q-wrap');
        const qText = document.getElementById('q-text');
        let q = game.pool[game.idx];
        
        qText.classList.remove('q-fade');
        void qText.offsetWidth; 
        qText.classList.add('q-fade');

        let ruler = document.createElement('span');
        ruler.style.cssText = "visibility:hidden; position:absolute; white-space:nowrap; font-weight:900; font-family:'Inter',sans-serif; font-size:100px;";
        ruler.innerText = q.text;
        document.body.appendChild(ruler);
        let ratio = (wrap.clientWidth * 0.95) / ruler.offsetWidth;
        document.body.removeChild(ruler);

        qText.style.fontSize = Math.floor(Math.min(100 * ratio, 120)) + 'px';
        qText.innerText = q.text;
        
        const mainInput = document.getElementById('ans-main');
        mainInput.value = '';
        mainInput.classList.remove('ans-error');
        document.getElementById('ans-rem').value = '';
        document.getElementById('info-progress').innerText = (conf.mode === 'unlimited') ? '♾️' : `${game.idx + 1}/${game.pool.length}`;
        mainInput.focus();
    }

    function check() {
        const q = game.pool[game.idx];
        const mainInput = document.getElementById('ans-main');
        const a = parseInt(mainInput.value);
        const r = parseInt(document.getElementById('ans-rem').value) || 0;
        const qText = document.getElementById('q-text');

        if(a === q.ans && (conf.op !== 'div' || r === q.rem)) {
            qText.classList.add('success-glow');
            setTimeout(() => {
                qText.classList.remove('success-glow');
                game.idx++;
                if(game.idx >= game.pool.length) { alert("測驗完畢！"); show('screen-menu'); }
                else render();
            }, 200);
        } else {
            mainInput.classList.remove('ans-error');
            void mainInput.offsetWidth; 
            mainInput.classList.add('ans-error');
        }
    }

    function skip() { game.idx++; render(); }

    function clock() {
        clearInterval(game.timer);
        game.timer = setInterval(() => {
            let elapsed = Math.floor((Date.now() - game.start) / 1000);
            document.getElementById('info-timer').innerText = `${Math.floor(elapsed/60)}:${(elapsed%60).toString().padStart(2,'0')}`;
        }, 1000);
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
        if(e.key === 'Enter') check();
    });
</script>
</body>
</html>
